name: PreCommit
on:
  push:
    tags:
      - '*'
    branches:
      - 'master'
  pull_request:
    branches:
      - 'master'

jobs:
  pre-commit:
    name: Pre-commit hook
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'

      - name: Install checked out JuliaFormatter in global env
        run: |
          julia -e 'using Pkg; Pkg.add(; path=".")'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run pre-commit hook
        working-directory: .github/workflows/pre-commit
        run: pipx run pre-commit try-repo ../../../ --files main.jl --verbose

      - name: Verify hook made changes
        working-directory: .github/workflows/pre-commit
        run: |
          git diff --exit-code main.jl && echo "::error::Hook did not modify main.jl" && exit 1 || echo "Hook correctly formatted main.jl"
