name: FormatBot

on:
  issue_comment:
    types: [created]

jobs:
  format:
    name: FormatBot
    if: >-
      github.event.issue.pull_request
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      && startsWith(github.event.comment.body, '!formatbot')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write

    steps:
      - name: React to comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          {
            echo "base_sha=$(echo "$PR" | jq -r '.base.sha')"
            echo "head_sha=$(echo "$PR" | jq -r '.head.sha')"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout JuliaFormatter (PR)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          path: formatter-pr

      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # 3.0.2
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # 3.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: '3.13'

      - name: Run FormatBot
        id: formatbot
        env:
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Parse the !formatbot comment into script arguments
          read -ra PARTS <<< "$COMMENT_BODY"
          # PARTS[0] is "!formatbot", rest are the arguments
          python formatter-pr/.github/scripts/formatbot.py "${PARTS[@]:1}" \
            --base-ref "${{ steps.pr.outputs.base_sha }}" \
            --formatter-pr formatter-pr \
            --diff-output "$RUNNER_TEMP/diff.patch" \
            > "$RUNNER_TEMP/comment.md"

      - name: Print diff
        if: always() && steps.formatbot.outcome == 'success'
        run: |
          if [ -s "$RUNNER_TEMP/diff.patch" ]; then
            cat "$RUNNER_TEMP/diff.patch"
          fi

      - name: Post comment
        if: always() && steps.formatbot.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s "$RUNNER_TEMP/comment.md" ]; then
            gh pr comment "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --body-file "$RUNNER_TEMP/comment.md"
          fi
